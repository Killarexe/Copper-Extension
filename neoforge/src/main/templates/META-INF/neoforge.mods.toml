modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
issueTrackerURL = "${mod_issues_page}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
credits = "${mod_credits}"
description = "${mod_description}"
displayURL = "${mod_homepage}"
updateJSONURL="https://raw.githubusercontent.com/Killarexe/Copper-Extension/master/neoforge/update.json"
logoFile="assets/copper_extension/logo.png"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${neoforge_minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${neoforge_version_range}"
ordering = "NONE"
side = "BOTH"

[[mixins]]
config = "copper_extension_neoforge.mixins.json"

